name: Keep Render API Alive

on:
    schedule:
        - cron: "*/5 * * * *"
    workflow_dispatch:

jobs:
    keepalive:
        runs-on: ubuntu-latest

        steps:
            - name: Ping API Health Endpoint
              run: |
                  API_URL="https://bridgeapi-9uhl.onrender.com/api/health"

                  echo "Pinging: $API_URL"

                  response=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 30 "$API_URL" || true)

                  echo "Response: $response"

                  if [ "$response" = "200" ]; then
                    echo "API is healthy!"
                  else
                    echo "API returned: $response (may be cold starting)"
                  fi

            - name: Log timestamp
              run: |
                  echo "Ping executed at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
